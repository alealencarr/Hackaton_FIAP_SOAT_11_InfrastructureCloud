name: 🏗️ Infraestrutura Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}

jobs:
  terraform:
    name: 🏗️ Terraform
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Create Backend Storage
      if: github.ref == 'refs/heads/main'
      run: |
        az group create --name rg-fiapx-tfstate --location brazilsouth || true
        az storage account create --name fiapxtfstate --resource-group rg-fiapx-tfstate --location brazilsouth --sku Standard_LRS || true
        az storage container create --name tfstate --account-name fiapxtfstate || true
    
    - name: Terraform Init
      run: terraform init
    
    - name: Terraform Plan
      run: terraform plan -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" -out=tfplan
    
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve tfplan
    
    - name: Get Outputs
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "## 🎉 Infraestrutura Criada!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Recurso | Valor |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| ACR | $(terraform output -raw acr_login_server) |" >> $GITHUB_STEP_SUMMARY
        echo "| AKS | $(terraform output -raw aks_name) |" >> $GITHUB_STEP_SUMMARY
        echo "| SQL Server | $(terraform output -raw sql_server_fqdn) |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Agora para finalizar o projeto é só subir os PRs: fiapx-api → fiapx-worker → fiapx-email" >> $GITHUB_STEP_SUMMARY