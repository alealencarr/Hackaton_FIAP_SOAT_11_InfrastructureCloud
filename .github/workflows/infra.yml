name: 🏗️ Infraestrutura Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  STORAGE_ACCOUNT_NAME: "tfstatealesantos2026"
  RESOURCE_GROUP_TF: "rg-fiapx-tfstate"

jobs:
  terraform:
    name: 🏗️ Terraform
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Create Backend Storage
      run: |
        echo "🔨 Criando Resource Group..."
        az group create \
          --name ${{ env.RESOURCE_GROUP_TF }} \
          --location brazilsouth
        
        echo "🔨 Criando Storage Account: ${{ env.STORAGE_ACCOUNT_NAME }}..."
        az storage account create \
          --name ${{ env.STORAGE_ACCOUNT_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP_TF }} \
          --location brazilsouth \
          --sku Standard_LRS
        
        echo "🔨 Criando Container..."
        az storage container create \
          --name tfstate \
          --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
          --auth-mode login
        
        echo "✅ Backend criado!"
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ env.RESOURCE_GROUP_TF }}" \
          -backend-config="storage_account_name=${{ env.STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=fiapx.tfstate"
    
    - name: Terraform Plan
      run: terraform plan -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" -out=tfplan
    
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve tfplan
    
    - name: Show Outputs
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "## 🎉 Infraestrutura Criada!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Recurso | Valor |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| ACR | $(terraform output -raw acr_login_server) |" >> $GITHUB_STEP_SUMMARY
        echo "| AKS | $(terraform output -raw aks_name) |" >> $GITHUB_STEP_SUMMARY
        echo "| SQL | $(terraform output -raw sql_server_fqdn) |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Agora faça merge: **fiapx-api** → **fiapx-worker** → **fiapx-email**" >> $GITHUB_STEP_SUMMARY