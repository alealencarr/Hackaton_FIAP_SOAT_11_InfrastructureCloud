name: 🏗️ Infraestrutura Azure



on:

  push:

    branches: [ main ]

  pull_request:

    branches: [ main ]

  workflow_dispatch:



env:

  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}

  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}

  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}



jobs:

  terraform:

    name: 🏗️ Terraform

    runs-on: ubuntu-latest

   

    steps:

    - uses: actions/checkout@v4

   

    - name: Azure Login

      uses: azure/login@v1

      with:

        creds: ${{ secrets.AZURE_CREDENTIALS }}

   

    - name: Create Backend Storage

      run: |

        echo "🔨 Criando Resource Group para Terraform State..."

        az group create --name rg-fiapx-tfstate-alealencarr10 --location brazilsouth || true

       

        echo "🔨 Criando Storage Account..."

        az storage account create \

          --name fiapxtfstatealealencarr10 \

          --resource-group rg-fiapx-tfstate-alealencarr10 \

          --location brazilsouth \

          --sku Standard_LRS \

          --allow-blob-public-access false || true

       

        echo "🔨 Criando Container..."

        az storage container create \

          --name tfstate \

          --account-name fiapxtfstatealealencarr10 \

          --auth-mode login || true

       

        echo "⏳ Aguardando propagação..."

        sleep 30

   

    - name: Setup Terraform

      uses: hashicorp/setup-terraform@v3

   

    - name: Terraform Init

      run: terraform init

   

    - name: Terraform Plan

      run: terraform plan -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" -out=tfplan

   

    - name: Terraform Apply

      if: github.ref == 'refs/heads/main' && github.event_name == 'push'

      run: terraform apply -auto-approve tfplan

   

    - name: Show Outputs

      if: github.ref == 'refs/heads/main' && github.event_name == 'push'

      run: |

        echo "## 🎉 Infraestrutura Criada!" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY

        echo "| Recurso | Valor |" >> $GITHUB_STEP_SUMMARY

        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY

        echo "| ACR | $(terraform output -raw acr_login_server) |" >> $GITHUB_STEP_SUMMARY

        echo "| AKS | $(terraform output -raw aks_name) |" >> $GITHUB_STEP_SUMMARY

        echo "| SQL | $(terraform output -raw sql_server_fqdn) |" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY

        echo "✅ Agora faça merge: **fiapx-api** → **fiapx-worker** → **fiapx-email**" >> $GITHUB_STEP_SUMMARY
