name: "\U0001F3D7️ Infraestrutura Azure"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
  ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}

jobs:
  terraform:
    name: "\U0001F3D7️ Terraform"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ⚠️ PASSO CRÍTICO: forçar a subscription correta
      - name: Set Subscription
        run: |
          echo "🔍 Verificando login..."
          az account show --output table
          echo ""
          echo "🔄 Forçando subscription..."
          az account set --subscription "${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}"
          echo ""
          echo "✅ Subscription ativa:"
          az account show --query '{name:name, id:id, state:state}' --output table

      - name: Create Backend Storage
        if: github.ref == 'refs/heads/main'
        run: |
          echo "1. Criando Resource Group do tfstate..."
          az group create \
            --name rg-fiapx-tfst-fx2026 \
            --location brazilsouth \
            --output none || true

          echo "2. Criando Storage Account do tfstate..."
          az storage account create \
            --name fiapxtfstfx2026 \
            --resource-group rg-fiapx-tfst-fx2026 \
            --location brazilsouth \
            --sku Standard_LRS \
            --min-tls-version TLS1_2 \
            --output none || true

          echo "3. Criando Container do tfstate..."
          az storage container create \
            --name tfstate \
            --account-name fiapxtfstfx2026 \
            --auth-mode login \
            --output none || true

          echo "✅ Backend pronto!"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "## 🎉 Infraestrutura Criada!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Recurso | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ACR | $(terraform output -raw acr_login_server) |" >> $GITHUB_STEP_SUMMARY
          echo "| AKS | $(terraform output -raw aks_name) |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL Server | $(terraform output -raw sql_server_fqdn) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Infra pronta!" >> $GITHUB_STEP_SUMMARY